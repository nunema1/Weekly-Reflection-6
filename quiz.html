<!DOCTYPE html>
<html>
<body>
<form id="myQuiz">
    <div class="question">
    <p>1. Does pineapple belong on pizza?</p>
    <label><input type="radio" name="q1" value="a"> Yes</label><br>
    <label><input type="radio" name="q1" value="b"> No</label>
    <p>2. Which number has the same number of letters as it's value?</p>
    <label><input type="radio" name="q2" value="a">1</label>
    <label><input type="radio" name="q2" value="b">2</label>
    <label><input type="radio" name="q2" value="c">3</label>
    <label><input type="radio" name="q2" value="d">4</label>
    <label><input type="radio" name="q2" value="e">5</label>
    <label><input type="radio" name="q2" value="f">6</label>
    <p>3. What is my favorite color?</p>
    <label><input type="radio" name="q3" value="a">Red</label>
    <label><input type="radio" name="q3" value="b">Orange</label>
    <label><input type="radio" name="q3" value="c">Yellow</label>
    <label><input type="radio" name="q3" value="d">Green</label>
    <label><input type="radio" name="q3" value="e">Blue</label>
    <label><input type="radio" name="q3" value="f">Purple</label>
    <p>4. Is hockey the greatest?</p>
    <label><input type="radio" name="q4" value="a">Yes</label>
    <label><input type="radio" name="q4" value="b">No</label>
    <label><input type="radio" name="q4" value="c">I don't know</label>
    </div>
    <button type="button" onclick="calculateScore()">Submit</button>
</form>
<div id="result"></div>
</body>
</html>
<script>
function calculateScore() {
    const answers = { q1: "a", q2: "d", q3: "e", q4: "a" };
    let score = 0;
    const form = document.getElementById('myQuiz');
    const formData = new FormData(form);

    for (let [key, value] of formData.entries()) {
        if (value === answers[key]) score++;
    }
    document.getElementById('result').innerText = `Your score: ${score}`;
}
</script>
